<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>基金实时估算</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI";
  background: #f5f6f8;
  margin: 0;
  padding: 10px;
}

h2 {
  text-align: center;
  margin-bottom: 10px;
}

button {
  padding: 6px 10px;
  border-radius: 6px;
  border: none;
  background: #4CAF50;
  color: white;
}

.add-btn {
  width: 100%;
  margin-bottom: 10px;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.name {
  font-size: 14px;
  color: #333;
}

.code {
  font-size: 12px;
  color: #888;
}

input {
  width: 60px;
  text-align: center;
  border-radius: 6px;
  border: 1px solid #ddd;
}

.change {
  font-weight: bold;
}

.red { color: #e53935; }
.green { color: #2e7d32; }

.delete-btn {
  background: #ff4d4f;
  font-size: 12px;
  padding: 4px 6px;
}

#total {
  text-align: center;
  font-size: 26px;
  font-weight: bold;
  margin-top: 15px;
}

</style>
</head>

<body>

<h2>基金实时估算</h2>

<button class="add-btn" onclick="addRow()">➕ 添加股票</button>

<div id="list"></div>

<div id="total">0%</div>

<script>

async function getStockData(code) {
  try {
    let res = await fetch(`https://qt.gtimg.cn/q=${code}`);
    let buffer = await res.arrayBuffer();
    let text = new TextDecoder("gbk").decode(buffer);
    let data = text.split("~");

    return {
      name: data[1],
      change: parseFloat(data[32])
    };
  } catch {
    return { name: "-", change: 0 };
  }
}

async function calculate() {
  let cards = document.querySelectorAll(".card");
  let total = 0;

  for (let card of cards) {
    let codeInput = card.querySelector(".codeInput");
    let weightInput = card.querySelector(".weight");

    let code = codeInput.value.trim();
    let weight = parseFloat(weightInput.value) / 100;

    if (!code) continue;

    let data = await getStockData(code);

    let change = data.change;
    let impact = change * weight;

    // 名称
    card.querySelector(".name").innerText = data.name;

    // 涨跌颜色
    let changeEl = card.querySelector(".change");
    changeEl.innerText = change.toFixed(2) + "%";
    changeEl.className = "change " + (change >= 0 ? "red" : "green");

    total += impact;
  }

  let totalEl = document.getElementById("total");
  totalEl.innerText = total.toFixed(2) + "%";
  totalEl.style.color = total >= 0 ? "#e53935" : "#2e7d32";
}

function addRow(code="", weight=10) {
  let div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <div class="row">
      <div>
        <div class="name">--</div>
        <div class="code">
          <input class="codeInput" value="${code}" placeholder="sh600900">
        </div>
      </div>

      <div>
        <input class="weight" value="${weight}">%
      </div>

      <div class="change">-</div>

      <button class="delete-btn" onclick="this.parentNode.parentNode.remove()">删</button>
    </div>
  `;

  document.getElementById("list").appendChild(div);
}

function init() {
  let stocks = [
    ["sh600900",4.78],
    ["sh601668",4.4],
    ["sh601939",2.76],
    ["sh600028",2.32],
    ["sh600941",1.91],
    ["sh688009",1.91],
    ["sh601088",1.68],
    ["sh601398",1.61],
    ["sh601988",1.59],
    ["sh601225",1.28]
  ];

  for (let s of stocks) {
    addRow(s[0], s[1]);
  }

  calculate();
}

init();
setInterval(calculate, 5000);

</script>

</body>
</html>
