<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>基金实时估算</title>
<style>
table { border-collapse: collapse; width: 100%; }
th, td { border: 1px solid #ccc; padding: 6px; text-align: center; }
input { width: 80px; }
</style>
</head>

<body>

<h2>基金实时估算（自定义）</h2>

<table>
<thead>
<tr>
<th>股票代码</th>
<th>占比(%)</th>
<th>涨幅</th>
<th>影响</th>
</tr>
</thead>

<tbody id="body">
<tr>
<td><input value="sh600900"></td>
<td><input value="20"></td>
<td class="change">-</td>
<td class="impact">-</td>
</tr>
<tr>
<td><input value="sh600519"></td>
<td><input value="20"></td>
<td class="change">-</td>
<td class="impact">-</td>
</tr>
</tbody>
</table>

<br>
<button onclick="update()">刷新计算</button>

<h3 id="total">总涨跌：--</h3>

<script>
async function getChange(code) {
  const res = await fetch("https://qt.gtimg.cn/q=" + code);
  const text = await res.text();
  const data = text.split("~");

  const current = parseFloat(data[3]);
  const yesterday = parseFloat(data[4]);

  return (current - yesterday) / yesterday;
}

async function update() {
  let rows = document.querySelectorAll("#body tr");
  let total = 0;

  for (let row of rows) {
    let code = row.cells[0].children[0].value;
    let weight = parseFloat(row.cells[1].children[0].value) / 100;

    let change = await getChange(code);
    let impact = change * weight;

    row.querySelector(".change").innerText =
      (change * 100).toFixed(2) + "%";

    row.querySelector(".impact").innerText =
      (impact * 100).toFixed(2) + "%";

    total += impact;
  }

  document.getElementById("total").innerText =
    "总涨跌：" + (total * 100).toFixed(2) + "%";
}
</script>

</body>
</html>
