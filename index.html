<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>基金实时估算</title>
</head>
<body>

<h2>基金实时估算</h2>
<p id="result">加载中...</p>

<script>
const stocks = [
  { code: "sh600900", weight: 0.5 }, // 长江电力
  { code: "sh600519", weight: 0.5 }  // 贵州茅台（示例）
];

async function getPrice(code) {
  const url = "https://qt.gtimg.cn/q=" + code;
  const res = await fetch(url);
  const text = await res.text();

  const data = text.split("~");
  const current = parseFloat(data[3]);
  const yesterday = parseFloat(data[4]);

  return (current - yesterday) / yesterday;
}

async function calc() {
  let total = 0;

  for (let s of stocks) {
    const change = await getPrice(s.code);
    total += change * s.weight;
  }

  document.getElementById("result").innerText =
    "预计涨跌: " + (total * 100).toFixed(2) + "%";
}

calc();
setInterval(calc, 10000);
</script>

</body>
</html>
