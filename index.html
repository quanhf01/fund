<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>KONG</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  font-family: Arial;
}

#top {
  height: 40vh;
  overflow: hidden;
  border-bottom: 1px solid #ccc;
  padding: 10px;
  box-sizing: border-box;
}

#bottom {
  height: 60vh;
  overflow-y: auto;
  padding: 10px;
  box-sizing: border-box;
}

button { margin: 5px; }

.box {
  border: 1px solid #ccc;
  padding: 8px;
  margin-top: 10px;
}
</style>

</head>

<body>

<div id="top">
  <h3>预估</h3>
  <div id="estimate"></div>
</div>

<div id="bottom">

  <h3>列表管理</h3>
  <button onclick="addList()">添加列表</button>
  <div id="lists"></div>

  <div class="box">
    <h4>当前列表：<span id="current"></span></h4>
    <button onclick="addStock()">添加股票</button>
    <div id="stocks"></div>
  </div>

  <div class="box">
    <h3>记录</h3>
    <button onclick="addRecord()">添加记录</button>
    <div id="records"></div>
  </div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("KONG")) || {
  lists: {},
  current: null,
  records: []
};

function save() {
  localStorage.setItem("KONG", JSON.stringify(data));
}

function addList() {
  const name = prompt("列表名");
  if (!name) return;

  data.lists[name] = [];
  data.current = name;
  save();
  render();
}

function switchList(name) {
  data.current = name;
  save();
  render();
}

function addStock() {
  if (!data.current) return alert("先选列表");

  const stock = prompt("股票");
  if (!stock) return;

  data.lists[data.current].push(stock);
  save();
  render();
}

function addRecord() {
  const stock = prompt("股票");
  const price = prompt("价格");
  if (!stock || !price) return;

  data.records.push({
    stock,
    price,
    date: new Date().toLocaleString()
  });

  save();
  render();
}

function render() {

  lists.innerHTML = "";
  stocks.innerHTML = "";
  records.innerHTML = "";

  document.getElementById("current").innerText = data.current || "无";

  for (let name in data.lists) {
    const btn = document.createElement("button");
    btn.innerText = name;
    btn.onclick = () => switchList(name);
    lists.appendChild(btn);
  }

  if (data.current) {
    data.lists[data.current].forEach(s => {
      const div = document.createElement("div");
      div.innerText = s;
      stocks.appendChild(div);
    });
  }

  data.records.forEach(r => {
    const div = document.createElement("div");
    div.innerText = `${r.date} - ${r.stock} - ${r.price}`;
    records.appendChild(div);
  });

  let total = data.records.reduce((sum, r) => sum + Number(r.price), 0);
  document.getElementById("estimate").innerText = "总投入：" + total;

}

render();

</script>

</body>
</html>
