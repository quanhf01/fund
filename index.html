<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>基金估算</title>
</head>

<body>

<h2>基金实时估算</h2>

<div id="result">计算中...</div>

<script>
let stocks = [
  {code: "sh600900", weight: 0.2},
  {code: "sh601398", weight: 0.2},
  {code: "sh600519", weight: 0.2}
];

async function getPrice(code) {
  let url = "https://corsproxy.io/?https://qt.gtimg.cn/q=" + code;
  let res = await fetch(url);
  let text = await res.text();
  let data = text.split("~");
  let price = parseFloat(data[3]);
  let pre = parseFloat(data[4]);
  return (price - pre) / pre;
}

async function calc() {
  let total = 0;
  for (let s of stocks) {
    let change = await getPrice(s.code);
    total += change * s.weight;
  }
  document.getElementById("result").innerText =
    "预计涨跌：" + (total * 100).toFixed(2) + "%";
}

calc();
</script>

</body>
</html>
