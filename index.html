<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>基金实时估算</title>
<style>
  table { border-collapse: collapse; width: 100%; }
  td, th { border: 1px solid #ccc; padding: 8px; text-align: center; }
  input { width: 80px; }
  button { margin: 5px; }
</style>
</head>
<body>

<h2>基金实时估算（自动版）</h2>

<button onclick="addRow()">➕ 添加股票</button>

<table>
<thead>
<tr>
  <th>股票代码</th>
  <th>占比(%)</th>
  <th>涨幅</th>
  <th>影响</th>
  <th>操作</th>
</tr>
</thead>

<tbody id="tbody">
</tbody>
</table>

<h3 id="total">总涨跌：0%</h3>

<script>

// 获取股票数据（已修复乱码）
async function getStockData(code) {
  try {
    let url = `https://qt.gtimg.cn/q=${code}`;
    let res = await fetch(url);

    let buffer = await res.arrayBuffer();
    let text = new TextDecoder("gbk").decode(buffer);

    let data = text.split("~");

    return {
      name: data[1],
      change: parseFloat(data[32])
    };
  } catch (e) {
    return { name: "-", change: 0 };
  }
}

// 计算
async function calculate() {
  let rows = document.querySelectorAll("#tbody tr");
  let total = 0;

  for (let row of rows) {
    let codeInput = row.querySelector(".code");
    let weightInput = row.querySelector(".weight");

    let code = codeInput.value.trim();
    let weight = parseFloat(weightInput.value) / 100;

    if (!code) continue;

    let data = await getStockData(code);

    // 显示名称（不会再乱码）
    row.querySelector(".name").innerText = data.name;

    let change = data.change;
    let impact = change * weight;

    row.querySelector(".change").innerText = change.toFixed(2) + "%";
    row.querySelector(".impact").innerText = impact.toFixed(2) + "%";

    total += impact;
  }

  document.getElementById("total").innerText =
    "总涨跌：" + total.toFixed(2) + "%";
}

// 添加行
function addRow(code="", weight=10) {
  let tbody = document.getElementById("tbody");

  let tr = document.createElement("tr");
  tr.innerHTML = `
    <td>
      <input class="code" value="${code}" placeholder="sh600900">
      <div class="name" style="font-size:12px;color:#666"></div>
    </td>
    <td><input class="weight" value="${weight}"></td>
    <td class="change">-</td>
    <td class="impact">-</td>
    <td><button onclick="deleteRow(this)">删除</button></td>
  `;

  tbody.appendChild(tr);
}

// 删除行
function deleteRow(btn) {
  btn.parentNode.parentNode.remove();
}

// ⭐ 初始化（直接给你10只）
function init() {
  let stocks = [
    ["sh600900",20],
    ["sh601668",10],
    ["sh601939",10],
    ["sh600028",10],
    ["sh600941",10],
    ["sh688009",10],
    ["sh601088",10],
    ["sh601398",10],
    ["sh601988",10],
    ["sh601225",10]
  ];

  for (let s of stocks) {
    addRow(s[0], s[1]);
  }

  calculate();
}

init();

// 自动刷新
setInterval(calculate, 5000);

</script>

</body>
</html>
