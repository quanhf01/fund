<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>基金决策系统</title>

<style>
body {
  font-family: -apple-system;
  background: #f5f6f8;
  margin: 0;
}

/* 顶部切换 */
.tabs {
  display: flex;
  background: white;
}

.tab {
  flex: 1;
  text-align: center;
  padding: 10px;
  font-weight: bold;
  border-bottom: 2px solid transparent;
}

.active {
  color: #4CAF50;
  border-bottom: 2px solid #4CAF50;
}

.page {
  display: none;
  padding: 10px;
}

.show {
  display: block;
}

/* 通用 */
.btn {
  width: 100%;
  background: #4CAF50;
  color: white;
  padding: 8px;
  border-radius: 6px;
  border: none;
  margin-bottom: 8px;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 8px;
}

.row {
  display: flex;
  gap: 6px;
}

input, select {
  flex: 1;
  padding: 6px;
  border-radius: 6px;
  border: 1px solid #ddd;
}

.total {
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}
</style>
</head>

<body>

<!-- 🔘 切换按钮 -->
<div class="tabs">
  <div class="tab active" onclick="switchTab(0)">📊 估值</div>
  <div class="tab" onclick="switchTab(1)">📝 记录</div>
</div>

<!-- 📊 页面1：估值 -->
<div class="page show" id="page1">

<h3>基金实时估算</h3>
<button class="btn" onclick="calc()">刷新估值</button>

<div id="estimateResult" class="total">--</div>

</div>

<!-- 📝 页面2：记录 -->
<div class="page" id="page2">

<h3>交易记录</h3>
<button class="btn" onclick="addRecord()">➕ 添加记录</button>

<div id="list"></div>

<div id="summary" class="total"></div>

</div>

<script>

/* 切换 */
function switchTab(i) {
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("show"));

  document.querySelectorAll(".tab")[i].classList.add("active");
  document.querySelectorAll(".page")[i].classList.add("show");
}

/* ===== 估值（简单版占位） ===== */
function calc() {
  let val = (Math.random()*2-1).toFixed(3);
  document.getElementById("estimateResult").innerText = val + "%";
}

/* ===== 记录系统 ===== */
let records = JSON.parse(localStorage.getItem("records")||"[]");

function save(){
  localStorage.setItem("records", JSON.stringify(records));
}

function addRecord(){
  let d = new Date().toISOString().slice(0,10);
  records.push({date:d,estimate:"",actual:"",action:"加仓",amount:""});
  save();
  render();
}

function update(i,k,v){
  records[i][k]=v;
  save();
  render();
}

function render(){
  let list = document.getElementById("list");
  list.innerHTML="";

  let total=0;
  let canSell=0;
  let now=Date.now();

  records.forEach((r,i)=>{
    let days=(now-new Date(r.date))/86400000;

    if(r.action==="加仓"){
      total+=Number(r.amount||0);
      if(days>=30) canSell+=Number(r.amount||0);
    }
    if(r.action==="减仓"){
      total-=Number(r.amount||0);
    }

    let div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
    <div class="row">
      <input type="date" value="${r.date}" onchange="update(${i},'date',this.value)">
      <input placeholder="预估%" value="${r.estimate}" onchange="update(${i},'estimate',this.value)">
      <input placeholder="实际%" value="${r.actual}" onchange="update(${i},'actual',this.value)">
    </div>
    <div class="row">
      <select onchange="update(${i},'action',this.value)">
        <option ${r.action==='加仓'?'selected':''}>加仓</option>
        <option ${r.action==='减仓'?'selected':''}>减仓</option>
      </select>
      <input placeholder="金额" value="${r.amount}" onchange="update(${i},'amount',this.value)">
    </div>
    <div style="font-size:12px;color:#999">
      持有 ${days.toFixed(0)} 天 ${days>=30?'✅':''}
    </div>
    `;

    list.appendChild(div);
  });

  document.getElementById("summary").innerText =
    `总投入:${total} ｜ 满30天:${canSell}`;
}

render();

</script>

</body>
</html>
