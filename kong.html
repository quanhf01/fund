<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>组合页面</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#f5f6f8;
}

/* ===== 上半部分：预估 ===== */
#top{
  height:40vh;
  overflow:hidden;
  border-bottom:1px solid #ddd;
  background:#fff;
}

/* ===== 下半部分：记录（可滚动） ===== */
#bottom{
  height:60vh;
  overflow-y:auto;
  padding:8px;
}

/* 通用 */
h2,h3{ margin:6px 0; }

/* 防止两个系统互相影响 */
.section{
  padding:8px;
}
</style>
</head>

<body>

<!-- ===================== 上：预估系统 ===================== -->
<div id="top">
  <div class="section">

    <h3>📊 基金预估</h3>

    <button onclick="addRow()">➕ 添加股票</button>

    <div id="list"></div>

    <div id="total">0%</div>

  </div>
</div>

<!-- ===================== 下：记录系统 ===================== -->
<div id="bottom">

  <div class="section">

    <h3>📒 记录表</h3>

    <button onclick="addRecord()">➕ 添加记录</button>

    <div id="records"></div>

  </div>

</div>

<script>

//////////////////////////////////////////////////////
// ========== 上半部分：基金预估系统 ==========
//////////////////////////////////////////////////////

async function getStockData(code){
  try{
    let res = await fetch(`https://qt.gtimg.cn/q=${code}`);
    let buffer = await res.arrayBuffer();
    let text = new TextDecoder("gbk").decode(buffer);
    let data = text.split("~");

    let price = parseFloat(data[3]);
    let yest = parseFloat(data[4]);

    let change = ((price - yest)/yest)*100;

    return {name:data[1], change};
  }catch{
    return {name:"-", change:0};
  }
}

function addRow(){
  let div = document.createElement("div");

  div.innerHTML = `
    <input class="code" placeholder="sh600900">
    <input class="weight" value="10">
    <span class="name">--</span>
    <span class="change">-</span>
    <span class="impact">-</span>
    <button onclick="this.parentNode.remove()">删</button>
  `;

  document.getElementById("list").appendChild(div);
}

async function calculate(){

  let rows = document.querySelectorAll("#list > div");
  let total = 0;

  for(let r of rows){

    let code = r.querySelector(".code").value;
    let weight = Number(r.querySelector(".weight").value)/100;

    if(!code) continue;

    let d = await getStockData(code);

    let change = d.change;
    let impact = change * weight;

    r.querySelector(".name").innerText = d.name;
    r.querySelector(".change").innerText = change.toFixed(2)+"%";
    r.querySelector(".impact").innerText = impact.toFixed(2)+"%";

    total += impact;
  }

  document.getElementById("total").innerText =
    "总收益：" + total.toFixed(2) + "%";
}

setInterval(calculate, 5000);


//////////////////////////////////////////////////////
// ========== 下半部分：记录系统 ==========
//////////////////////////////////////////////////////

let rows = JSON.parse(localStorage.getItem("rows")||"[]");

function addRecord(){
  let stock = prompt("股票");
  let price = prompt("价格");

  if(!stock||!price) return;

  rows.push({
    stock,
    price,
    time:new Date().toLocaleString()
  });

  save();
}

function save(){
  localStorage.setItem("rows",JSON.stringify(rows));
  render();
}

function render(){

  let box = document.getElementById("records");
  box.innerHTML = "";

  rows.forEach(r=>{

    let div = document.createElement("div");

    div.style.background="#fff";
    div.style.margin="6px 0";
    div.style.padding="6px";
    div.style.borderRadius="6px";

    div.innerHTML = `
      <div>${r.time}</div>
      <div>${r.stock} - ${r.price}</div>
    `;

    box.appendChild(div);
  });

}

render();

</script>

</body>
</html>
