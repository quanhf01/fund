<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>KONG表</title>
<style>
body { font-family: Arial; padding: 20px; }
button { margin: 5px; }
.box { border: 1px solid #ccc; padding: 10px; margin-top: 10px; }
</style>
</head>
<body>

<h2>列表</h2>
<button onclick="addList()">添加列表</button>
<div id="lists"></div>

<div class="box">
  <h3>当前列表：<span id="current"></span></h3>
  <button onclick="addStock()">添加股票</button>
  <div id="stocks"></div>
</div>

<hr>

<h2>记录</h2>
<button onclick="addRecord()">添加记录</button>
<div id="records"></div>

<script>
let data = JSON.parse(localStorage.getItem("KONG")) || {
  lists: {},
  current: null,
  records: []
};

function save() {
  localStorage.setItem("KONG", JSON.stringify(data));
}

function addList() {
  const name = prompt("列表名");
  if (!name) return;
  data.lists[name] = [];
  data.current = name;
  save();
  render();
}

function switchList(name) {
  data.current = name;
  save();
  render();
}

function addStock() {
  if (!data.current) return alert("先选列表");
  const stock = prompt("股票");
  if (!stock) return;
  data.lists[data.current].push(stock);
  save();
  render();
}

function addRecord() {
  const stock = prompt("股票");
  const price = prompt("价格");
  if (!stock || !price) return;
  data.records.push({
    stock,
    price,
    date: new Date().toLocaleString()
  });
  save();
  render();
}

function render() {
  const listsDiv = document.getElementById("lists");
  const stocksDiv = document.getElementById("stocks");
  const recordsDiv = document.getElementById("records");

  listsDiv.innerHTML = "";
  stocksDiv.innerHTML = "";
  recordsDiv.innerHTML = "";

  document.getElementById("current").innerText = data.current || "无";

  for (let name in data.lists) {
    const btn = document.createElement("button");
    btn.innerText = name;
    btn.onclick = () => switchList(name);
    listsDiv.appendChild(btn);
  }

  if (data.current) {
    data.lists[data.current].forEach(s => {
      const div = document.createElement("div");
      div.innerText = s;
      stocksDiv.appendChild(div);
    });
  }

  data.records.forEach(r => {
    const div = document.createElement("div");
    div.innerText = r.date + " - " + r.stock + " - " + r.price;
    recordsDiv.appendChild(div);
  });
}

render();
</script>

</body>
</html>
