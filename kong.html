<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>组合资金 + 股票实时系统</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#f5f6f8;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* =========================
   🔥 上半部分（固定）
========================= */
#stockApp{
  background:#fff;
  padding:8px;
  border-bottom:1px solid #eee;
}

#stockApp h2{
  text-align:center;
  margin:6px 0;
  font-size:16px;
}

#stockApp .add-btn{
  width:100%;
  background:#4CAF50;
  color:#fff;
  border:none;
  padding:8px;
  border-radius:6px;
  margin-bottom:6px;
}

#stockApp .header{
  display:grid;
  grid-template-columns:2fr 1fr 1fr 1fr auto;
  font-size:12px;
  color:#666;
}

#stockApp .card{
  display:grid;
  grid-template-columns:2fr 1fr 1fr 1fr auto;
  gap:6px;
  align-items:center;
  padding:6px 0;
}

#stockApp .stock-box{ display:flex;flex-direction:column; }
#stockApp .name{ font-weight:bold;font-size:13px; }
#stockApp .codeInput{ font-size:11px;border:none;border-bottom:1px solid #ddd; }

#stockApp .weight{
  width:60px;
  text-align:center;
  border:none;
  background:#f0f2f5;
  border-radius:20px;
}

#stockApp .change{ font-size:12px; }
#stockApp .red{ color:#e53935; }
#stockApp .green{ color:#2e7d32; }

#stockApp .delete-btn{
  background:#ff4d4f;
  border:none;
  color:#fff;
  border-radius:4px;
  padding:2px 6px;
}

#total{
  text-align:center;
  font-size:20px;
  font-weight:bold;
  margin-top:6px;
}

/* =========================
   🔥 下半部分（滚动）
========================= */
#fundApp{
  flex:1;
  overflow:auto;
  padding:6px;
}

.summary{
  display:flex;
  background:#fff;
  border-radius:8px;
  padding:10px;
  margin-bottom:6px;
}

.summary div{ flex:1;text-align:center; }
.summary span{ font-size:20px;font-weight:bold; }

.btn-row{
  display:flex;
  gap:6px;
  margin-bottom:6px;
}

.btn-row button{
  flex:1;
  background:#4CAF50;
  color:#fff;
  border:none;
  padding:8px;
  border-radius:6px;
}

table{
  width:100%;
  background:#fff;
  border-collapse:collapse;
  table-layout:fixed;
}

th,td{
  font-size:11px;
  text-align:center;
  padding:2px;
  white-space:nowrap;
}

th{ background:#eee; }

input{
  width:100%;
  text-align:center;
  font-size:11px;
}

.delBtn{
  background:#ff4d4f;
  color:#fff;
  border:none;
  border-radius:4px;
}

/* 解锁区 */
.unlockBox{
  background:#fff;
  margin-top:6px;
  padding:6px;
  border-radius:6px;
}

.unlockGrid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  font-size:11px;
  gap:4px;
}
</style>
</head>

<body>

<!-- =======================
     📌 股票系统（上）
======================= -->
<div id="stockApp">
  <h2>股票实时估算</h2>
  <button class="add-btn" onclick="addStockRow()">+ 添加股票</button>

  <div class="header">
    <div>股票</div>
    <div>占比</div>
    <div>涨跌</div>
    <div>影响</div>
    <div></div>
  </div>

  <div id="stockList"></div>

  <div id="total">0%</div>
</div>

<!-- =======================
     📌 资金系统（下）
======================= -->
<div id="fundApp">

  <div class="summary">
    <div>持仓<br><span id="sumHolding">0</span></div>
    <div>收益<br><span id="sumProfit">0</span></div>
    <div>T+<input id="tDays" value="3" style="width:40px"> <br><span id="sumT">0</span></div>
  </div>

  <div class="btn-row">
    <button onclick="addFundRow()">+ 新增一天</button>
    <button onclick="calculateFund()">刷新</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>#</th><th>日期</th><th>预估%</th><th>实际%</th>
        <th>持仓</th><th>收益</th><th>操作</th><th>最终</th><th>删</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <div class="unlockBox">
    <div>资金解锁：</div>
    <div class="unlockGrid" id="unlockBox"></div>
  </div>

</div>

<script>

/* =========================
   📌 股票模块
========================= */
const stockCache = new Map();

async function getStockData(code){
  if(stockCache.has(code)) return stockCache.get(code);

  let res = await fetch(`https://qt.gtimg.cn/q=${code}`);
  let buf = await res.arrayBuffer();
  let txt = new TextDecoder("gbk").decode(buf);
  let d = txt.split("~");

  let price = parseFloat(d[3]);
  let y = parseFloat(d[4]);
  let change = ((price - y)/y)*100;

  let result = {name:d[1], change};

  stockCache.set(code,result);
  return result;
}

function addStockRow(code="",weight=10){
  let div=document.createElement("div");
  div.className="card";

  div.innerHTML=`
    <div class="stock-box">
      <div class="name">--</div>
      <input class="codeInput" value="${code}">
    </div>

    <input class="weight" value="${weight}">

    <div class="change">-</div>
    <div class="impact">-</div>

    <button class="delete-btn" onclick="this.parentNode.remove()">删</button>
  `;

  document.getElementById("stockList").appendChild(div);
}

async function calculateStock(){
  let cards=[...document.querySelectorAll("#stockList .card")];
  let total=0;

  let tasks=cards.map(async c=>{
    let code=c.querySelector(".codeInput").value.trim();
    let w=parseFloat(c.querySelector(".weight").value)/100;

    if(!code) return 0;

    let d=await getStockData(code);

    let change=d.change;
    let impact=change*w;

    c.querySelector(".name").innerText=d.name;
    let ce=c.querySelector(".change");
    ce.innerText=change.toFixed(2)+"%";
    ce.className="change "+(change>=0?"red":"green");

    let ie=c.querySelector(".impact");
    ie.innerText=impact.toFixed(3)+"%";
    ie.className="change "+(impact>=0?"red":"green");

    return impact;
  });

  let r=await Promise.all(tasks);
  total=r.reduce((a,b)=>a+b,0);

  let t=document.getElementById("total");
  t.innerText=total.toFixed(3)+"%";
  t.style.color=total>=0?"#e53935":"#2e7d32";
}

/* 自动刷新 */
setInterval(calculateStock,5000);

/* 初始化 */
addStockRow("sh600900",4.7);
addStockRow("sh601668",4.4);


/* =========================
   📌 资金模块（不改逻辑）
========================= */
let rows=JSON.parse(localStorage.getItem("rows")||"[]");

function save(){ localStorage.setItem("rows",JSON.stringify(rows)); render(); }

function addFundRow(){
  let prev=rows.length?Number(rows[rows.length-1].final):0;
  rows.push({date:"",estimate:"",actual:"",holding:prev,profit:0,action:0,final:prev});
  save();
}

function update(i,k,v){ rows[i][k]=v; save(); }
function del(i){ rows.splice(i,1); save(); }

function calculateFund(){

  let total=0;

  for(let i=0;i<rows.length;i++){
    rows[i].holding=i===0?0:Number(rows[i-1].final);

    let h=Number(rows[i].holding)||0;
    let a=parseFloat(rows[i].actual)||0;
    let act=Number(rows[i].action)||0;

    let p=h*(a/100);

    rows[i].profit=p.toFixed(2);
    rows[i].final=h+p+act;

    total+=p;
  }

  document.getElementById("sumHolding").innerText=rows.at(-1)?.final||0;
  document.getElementById("sumProfit").innerText=total.toFixed(2);

  render();
  save();
}

function render(){
  let tb=document.getElementById("tbody");
  tb.innerHTML="";

  rows.forEach((r,i)=>{
    let tr=document.createElement("tr");

    tr.innerHTML=`
    <td>${i+1}</td>
    <td><input value="${r.date}" onchange="update(${i},'date',this.value)"></td>
    <td><input value="${r.estimate}" onchange="update(${i},'estimate',this.value)"></td>
    <td><input value="${r.actual}" onchange="update(${i},'actual',this.value)"></td>
    <td>${Number(r.holding).toFixed(0)}</td>
    <td>${Number(r.profit).toFixed(2)}</td>
    <td><input value="${r.action}" onchange="update(${i},'action',this.value)"></td>
    <td>${Number(r.final).toFixed(0)}</td>
    <td><button class="delBtn" onclick="del(${i})">删</button></td>
    `;

    tb.appendChild(tr);
  });
}

render();
</script>

</body>
</html>
