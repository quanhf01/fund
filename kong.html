<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>合并页面</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#f5f6f8;
}

/* 上半部分 */
#top{
  height:45vh;
  overflow:hidden;
  border-bottom:1px solid #ddd;
}

/* 下半部分 */
#bottom{
  height:55vh;
  overflow-y:auto;
}
</style>
</head>

<body>

<!-- ================= 上：基金预估（原样放入） ================= -->
<div id="top">

<h2>基金实时估算</h2>

<button class="add-btn" onclick="addRow()">➕ 添加股票</button>

<div class="header">
  <div>股票</div>
  <div>占比</div>
  <div>涨跌</div>
  <div>影响</div>
  <div></div>
</div>

<div id="list"></div>

<div id="total">0%</div>

</div>

<!-- ================= 下：记录系统（原样放入） ================= -->
<div id="bottom">

<div class="container">

<div class="summary">
  <div>持仓<span id="sumHolding">0</span></div>
  <div>收益<span id="sumProfit">0</span></div>
  <div>
    T+<input id="tDays" value="3" style="width:55px;">金额
    <span id="sumT">0</span>
  </div>
</div>

<div class="btn-row">
  <button onclick="addRow()">+ 新增一天</button>
  <button onclick="calculate()">刷新计算</button>
</div>

<table>
<thead>
<tr>
<th>#</th>
<th>日期</th>
<th>预估%</th>
<th>实际%</th>
<th>持仓</th>
<th>收益</th>
<th>操作</th>
<th>最终</th>
<th>删</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<div class="unlockBox">
  <div>资金解锁明细：</div>
  <div class="unlockGrid" id="unlockBox"></div>
</div>

</div>

</div>

<script>

/* ====== 这里开始：两段JS完全原样保留 ====== */

/* 上半部分基金逻辑 */
async function getStockData(code){
  try{
    let res = await fetch(`https://qt.gtimg.cn/q=${code}`);
    let buffer = await res.arrayBuffer();
    let text = new TextDecoder("gbk").decode(buffer);
    let data = text.split("~");

    let price = parseFloat(data[3]);
    let yesterday = parseFloat(data[4]);
    let change = ((price - yesterday)/yesterday)*100;

    return {name:data[1], change};

  }catch{
    return {name:"-", change:0};
  }
}

function addRow(){
  let div = document.createElement("div");
  div.innerHTML=`
    <input class="codeInput">
    <input class="weight" value="10">
    <span class="name">--</span>
    <span class="change">-</span>
    <span class="impact">-</span>
    <button onclick="this.parentNode.remove()">删</button>
  `;
  document.getElementById("list").appendChild(div);
}

async function calculate(){

  let cards=document.querySelectorAll("#list div");
  let total=0;

  for(let c of cards){

    let code=c.querySelector(".codeInput").value;
    let weight=Number(c.querySelector(".weight").value)/100;

    if(!code) continue;

    let d=await getStockData(code);

    let change=d.change;
    let impact=change*weight;

    c.querySelector(".name").innerText=d.name;
    c.querySelector(".change").innerText=change.toFixed(2)+"%";
    c.querySelector(".impact").innerText=impact.toFixed(2)+"%";

    total+=impact;
  }

  document.getElementById("total").innerText=total.toFixed(2)+"%";
}

setInterval(calculate,5000);


/* 下半部分记录逻辑（原样保留） */

let rows = JSON.parse(localStorage.getItem("rows")||"[]");

function save(){
  localStorage.setItem("rows",JSON.stringify(rows));
  render();
}

function render(){

  let tb=document.getElementById("tbody");
  tb.innerHTML="";

  rows.forEach((r,i)=>{

    let tr=document.createElement("tr");

    tr.innerHTML=`
    <td>${i+1}</td>
    <td><input value="${r.date||''}"></td>
    <td><input value="${r.estimate||''}"></td>
    <td><input value="${r.actual||''}"></td>
    <td>${r.holding||0}</td>
    <td>${r.profit||0}</td>
    <td><input value="${r.action||''}"></td>
    <td>${r.final||0}</td>
    <td><button onclick="rows.splice(${i},1);save()">删</button></td>
    `;

    tb.appendChild(tr);
  });

}

render();

</script>

</body>
</html>
