<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>组合系统 Pro Max</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#f5f6f8;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* 顶部收益 */
#topBar{
  background:#111;
  color:#fff;
  text-align:center;
  padding:8px;
}
#topBar span{
  font-size:18px;
  font-weight:bold;
}

/* 股票区 */
#stockApp{
  height:33vh;
  overflow:auto;
  background:#fff;
  padding:6px;
}
.header,.card{
  display:grid;
  grid-template-columns:2fr 1fr 1fr 1fr auto;
  gap:4px;
  font-size:11px;
  align-items:center;
}
.add-btn{
  width:100%;
  background:#4CAF50;
  color:#fff;
  border:none;
  padding:6px;
  border-radius:6px;
  margin-bottom:6px;
}
.stock-box{display:flex;flex-direction:column;}
.name{font-size:12px;font-weight:bold;}
.codeInput{font-size:10px;border:none;border-bottom:1px solid #ddd;}
.weight{width:55px;text-align:center;border:none;background:#f0f2f5;border-radius:20px;}
.red{color:#e53935;}
.green{color:#2e7d32;}
.delete-btn{background:#ff4d4f;color:#fff;border:none;border-radius:4px;font-size:10px;}

/* 资金区 */
#fundApp{flex:1;overflow:auto;padding:6px;}

.summary{
  display:flex;
  background:#fff;
  padding:8px;
  border-radius:8px;
  margin-bottom:6px;
}
.summary div{flex:1;text-align:center;}
.summary span{font-size:16px;font-weight:bold;}

.btn-row{display:flex;gap:6px;margin-bottom:6px;}
.btn-row button{
  flex:1;
  background:#4CAF50;
  color:#fff;
  border:none;
  padding:6px;
  border-radius:6px;
}

table{width:100%;background:#fff;border-collapse:collapse;}
th,td{font-size:10px;text-align:center;padding:2px;}
input{width:100%;font-size:10px;text-align:center;}
.delBtn{background:#ff4d4f;color:#fff;border:none;border-radius:4px;}
</style>
</head>

<body>

<div id="topBar">
  总收益：<span id="total">0%</span>
</div>

<div id="stockApp">
  <button class="add-btn" onclick="addStockRow()">+ 股票</button>

  <div class="header">
    <div>股票</div><div>占比</div><div>涨跌</div><div>影响</div><div></div>
  </div>

  <div id="stockList"></div>
</div>

<div id="fundApp">

<div class="summary">
  <div>持仓<br><span id="sumHolding">0</span></div>
  <div>收益<br><span id="sumProfit">0</span></div>
  <div>T+<input id="tDays" value="3" style="width:40px"><br><span id="sumT">0</span></div>
</div>

<div class="btn-row">
  <button onclick="addFundRow()">+ 新增</button>
  <button onclick="calculateFund()">刷新</button>
</div>

<table>
<thead>
<tr>
<th>#</th><th>日期</th><th>预估</th><th>实际</th>
<th>持仓</th><th>收益</th><th>操作</th><th>最终</th><th>删</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>

<script>

/* ===== 股票 ===== */
const cache=new Map();

async function getStock(code){
  if(cache.has(code)) return cache.get(code);

  let res=await fetch(`https://qt.gtimg.cn/q=${code}`);
  let buf=await res.arrayBuffer();
  let txt=new TextDecoder("gbk").decode(buf);
  let d=txt.split("~");

  let price=parseFloat(d[3]);
  let y=parseFloat(d[4]);
  let change=((price-y)/y)*100;

  let r={name:d[1],change};
  cache.set(code,r);
  return r;
}

function addStockRow(code="",w=10){
  let div=document.createElement("div");
  div.className="card";

  div.innerHTML=`
    <div class="stock-box">
      <div class="name">--</div>
      <input class="codeInput" value="${code}">
    </div>
    <input class="weight" value="${w}">
    <div class="change">-</div>
    <div class="impact">-</div>
    <button class="delete-btn" onclick="this.parentNode.remove()">删</button>
  `;

  stockList.appendChild(div);
}

/* ===== 资金 ===== */
let rows=JSON.parse(localStorage.getItem("rows")||"[]");

function save(){
  localStorage.setItem("rows",JSON.stringify(rows));
  render();
}

function addFundRow(){
  let prev=rows.length?Number(rows.at(-1).final):0;
  rows.push({date:"",estimate:"",actual:"",holding:prev,profit:0,action:0,final:prev});
  save();
}

function update(i,k,v){rows[i][k]=v;save();}

function del(i){
  if(confirm("确定删除这一行吗？")){
    rows.splice(i,1);
    save();
  }
}

/* ===== 核心：统一收益计算 ===== */
async function calcAll(){

  /* 股票 */
  let cards=[...document.querySelectorAll("#stockList .card")];

  let stockTasks=cards.map(async c=>{
    let code=c.querySelector(".codeInput").value.trim();
    let w=parseFloat(c.querySelector(".weight").value)/100;
    if(!code) return 0;

    let d=await getStock(code);
    let impact=d.change*w;

    c.querySelector(".name").innerText=d.name;

    let ce=c.querySelector(".change");
    ce.innerText=d.change.toFixed(2)+"%";
    ce.className="change "+(d.change>=0?"red":"green");

    let ie=c.querySelector(".impact");
    ie.innerText=impact.toFixed(3)+"%";
    ie.className="change "+(impact>=0?"red":"green");

    return impact;
  });

  let stockResult=await Promise.all(stockTasks);
  let stockTotal=stockResult.reduce((a,b)=>a+b,0);

  /* 资金 */
  let totalProfit=0;

  for(let i=0;i<rows.length;i++){
    rows[i].holding=i===0?0:Number(rows[i-1].final);

    let h=Number(rows[i].holding)||0;
    let a=parseFloat(rows[i].actual)||0;
    let e=parseFloat(rows[i].estimate)||0;
    let act=Number(rows[i].action)||0;

    let p=h*((a+e)/100);

    rows[i].profit=p.toFixed(2);
    rows[i].final=h+p+act;

    totalProfit+=p;
  }

  let fundTotal=rows.at(-1)?.final||0;
  let fundPercent=fundTotal? (totalProfit/fundTotal)*100 : 0;

  /* 合并 */
  let finalTotal=stockTotal+fundPercent;

  document.getElementById("total").innerText=finalTotal.toFixed(3)+"%";
  document.getElementById("total").style.color=finalTotal>=0?"#e53935":"#2e7d32";

  document.getElementById("sumHolding").innerText=fundTotal;
  document.getElementById("sumProfit").innerText=totalProfit.toFixed(2);

  save();
}

function render(){
  let tb=document.getElementById("tbody");
  tb.innerHTML="";

  rows.forEach((r,i)=>{
    let tr=document.createElement("tr");

    tr.innerHTML=`
    <td>${i+1}</td>
    <td><input value="${r.date}" onchange="update(${i},'date',this.value)"></td>
    <td><input value="${r.estimate}" onchange="update(${i},'estimate',this.value)"></td>
    <td><input value="${r.actual}" onchange="update(${i},'actual',this.value)"></td>
    <td>${Number(r.holding).toFixed(0)}</td>
    <td>${Number(r.profit).toFixed(2)}</td>
    <td><input value="${r.action}" onchange="update(${i},'action',this.value)"></td>
    <td>${Number(r.final).toFixed(0)}</td>
    <td><button class="delBtn" onclick="del(${i})">删</button></td>
    `;

    tb.appendChild(tr);
  });
}

/* 自动刷新 */
setInterval(calcAll,5000);

addStockRow("sh600900",4.7);
addStockRow("sh601668",4.4);

render();
calcAll();

</script>

</body>
</html>
