<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>每日记录</title>

<style>
body {
  font-family: -apple-system;
  background: #f5f6f8;
  margin: 0;
  font-size: 14px;
}

h3 {
  font-size: 18px;
  padding: 10px;
}

.btn {
  width: 95%;
  margin: 10px auto;
  display: block;
  background: #4CAF50;
  color: white;
  padding: 10px;
  border-radius: 10px;
  border: none;
  font-size: 15px;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  table-layout: fixed; /* 关键：压缩布局 */
}

th {
  background: #eee;
  font-size: 12px;
  padding: 6px 2px;
}

td {
  padding: 4px 2px;
  text-align: center;
}

/* 输入框压缩 */
input {
  width: 100%;
  padding: 6px 4px;
  font-size: 13px;
  border-radius: 6px;
  border: 1px solid #ddd;
  box-sizing: border-box;
}

/* 固定列宽（核心🔥） */
th:nth-child(1), td:nth-child(1) { width: 80px; }
th:nth-child(2), td:nth-child(2) { width: 55px; }
th:nth-child(3), td:nth-child(3) { width: 55px; }
th:nth-child(4), td:nth-child(4) { width: 70px; }
th:nth-child(5), td:nth-child(5) { width: 60px; }
th:nth-child(6), td:nth-child(6) { width: 60px; }
th:nth-child(7), td:nth-child(7) { width: 80px; }

</style>

</head>

<body>

<h3>📅 每日记录</h3>

<button class="btn" onclick="addRow()">➕ 新增一天</button>

<table>
<thead>
<tr>
<th>日期</th>
<th>预估%</th>
<th>实际%</th>
<th>持仓</th>
<th>加仓</th>
<th>减仓</th>
<th>最终</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

<script>

let rows = JSON.parse(localStorage.getItem("rows")||"[]");

/* 新增 */
function addRow(){
  let prev = rows.length>0 ? rows[rows.length-1].final : 10000;

  rows.push({
    date: new Date().toISOString().slice(0,10),
    estimate:"",
    actual:"",
    holding: prev,
    buy:"",
    sell:"",
    final: prev
  });

  save();
}

/* 更新 */
function update(i,key,val){
  rows[i][key]=val;
  calculate();
}

/* 自动计算 */
function calculate(){

  for(let i=0;i<rows.length;i++){

    if(i>0){
      rows[i].holding = Number(rows[i-1].final)||0;
    }

    let h = Number(rows[i].holding)||0;
    let b = Number(rows[i].buy)||0;
    let s = Number(rows[i].sell)||0;

    rows[i].final = (h + b - s).toFixed(2);
  }

  save();
}

/* 保存 */
function save(){
  localStorage.setItem("rows", JSON.stringify(rows));
  render();
}

/* 渲染 */
function render(){

  let tb = document.getElementById("tableBody");
  tb.innerHTML = "";

  rows.forEach((r,i)=>{

    let tr = document.createElement("tr");

    tr.innerHTML = `
<td><input type="date" value="${r.date}" onchange="update(${i},'date',this.value)"></td>

<td><input value="${r.estimate}" onchange="update(${i},'estimate',this.value)"></td>

<td><input value="${r.actual}" onchange="update(${i},'actual',this.value)"></td>

<td>${Number(r.holding).toFixed(2)}</td>

<td><input value="${r.buy}" onchange="update(${i},'buy',this.value)"></td>

<td><input value="${r.sell}" onchange="update(${i},'sell',this.value)"></td>

<td>${Number(r.final).toFixed(2)}</td>
`;

    tb.appendChild(tr);
  });
}

/* 初始化 */
render();

</script>

</body>
</html>
