<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>基金决策系统</title>

<style>
body {
  font-family: -apple-system;
  background: #f5f6f8;
  margin: 0;
  padding: 10px;
}

h2 {
  text-align: center;
}

.btn {
  width: 100%;
  background: #4CAF50;
  color: white;
  padding: 8px;
  border-radius: 6px;
  border: none;
  margin-bottom: 8px;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 8px;
}

.row {
  display: flex;
  gap: 6px;
  margin-bottom: 6px;
}

input, select {
  flex: 1;
  padding: 6px;
  border-radius: 6px;
  border: 1px solid #ddd;
}

.small {
  font-size: 12px;
  color: #999;
}

.total {
  text-align: center;
  font-size: 20px;
  font-weight: bold;
  margin-top: 10px;
}
</style>
</head>

<body>

<h2>基金交易记录</h2>

<button class="btn" onclick="addRecord()">➕ 添加记录</button>

<div id="list"></div>

<div class="total" id="summary"></div>

<script>

let records = JSON.parse(localStorage.getItem("records") || "[]");

function save() {
  localStorage.setItem("records", JSON.stringify(records));
}

function addRecord() {
  let today = new Date().toISOString().slice(0,10);

  records.push({
    date: today,
    estimate: "",
    actual: "",
    action: "加仓",
    amount: ""
  });

  save();
  render();
}

function render() {
  let list = document.getElementById("list");
  list.innerHTML = "";

  let totalInvest = 0;
  let totalHold = 0;

  let now = Date.now();

  records.forEach((r, i) => {

    let days = (now - new Date(r.date).getTime()) / (1000*3600*24);

    if (r.action === "加仓") {
      totalInvest += Number(r.amount || 0);
      if (days >= 30) totalHold += Number(r.amount || 0);
    }

    if (r.action === "减仓") {
      totalInvest -= Number(r.amount || 0);
    }

    let div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="row">
        <input type="date" value="${r.date}" onchange="update(${i},'date',this.value)">
        <input placeholder="预估%" value="${r.estimate}" onchange="update(${i},'estimate',this.value)">
        <input placeholder="实际%" value="${r.actual}" onchange="update(${i},'actual',this.value)">
      </div>

      <div class="row">
        <select onchange="update(${i},'action',this.value)">
          <option ${r.action==='加仓'?'selected':''}>加仓</option>
          <option ${r.action==='减仓'?'selected':''}>减仓</option>
        </select>

        <input placeholder="金额" value="${r.amount}" onchange="update(${i},'amount',this.value)">
      </div>

      <div class="small">
        持有天数：${days.toFixed(0)} 天
        ${days>=30 ? "✅ 可卖" : ""}
      </div>
    `;

    list.appendChild(div);
  });

  document.getElementById("summary").innerText =
    `总投入：${totalInvest} ｜ 满30天：${totalHold}`;
}

function update(i, key, value) {
  records[i][key] = value;
  save();
  render();
}

render();

</script>

</body>
</html>
