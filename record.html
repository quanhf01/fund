<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="utf-8">
<title>每日记录</title>

<style>
body { margin:0; font-family:-apple-system; background:#f5f6f8; font-size:11px;}
.container { padding:4px;}
.summary { display:flex; background:white; border-radius:8px; padding:6px; margin-bottom:6px;}
.summary div { flex:1; text-align:center;}
.summary span { display:block; font-weight:bold; margin-top:3px;}
button { width:100%; background:#4CAF50; color:white; border:none; padding:8px; border-radius:6px; margin-bottom:6px;}

table { width:100%; border-collapse:collapse; background:white;}
th,td { padding:2px; text-align:center;}
th { background:#eee;}

input { width:100%; font-size:10px; padding:2px;}
.delBtn { background:#ff4d4f; color:white; border:none; padding:4px; border-radius:4px;}
</style>
</head>

<body>
<div class="container">

<div class="summary">
  <div>持仓<span id="sumHolding">0</span></div>
  <div>累计收益<span id="sumProfit">0</span></div>
  <div>
    T+<input id="tDays" value="7" style="width:35px" onchange="calculate()">金额
    <span id="sumT">0</span>
  </div>
</div>

<button onclick="addRow()">➕ 新增一天</button>

<table>
<thead>
<tr>
<th>日期</th>
<th>预估%</th>
<th>实际%</th>
<th>持仓</th>
<th>收益</th>
<th>操作</th>
<th>最终</th>
<th>删</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>

<script>

let rows = JSON.parse(localStorage.getItem("rows") || "[]");

function addRow() {
  let prev = rows.length ? Number(rows[rows.length - 1].final) : 10000;

  rows.push({
    date: new Date().toISOString().slice(0,10),
    estimate:"",
    actual:"",
    holding:prev,
    profit:0,
    action:0,
    final:prev
  });

  save();
}

function deleteRow(i){
  rows.splice(i,1);
  calculate();
}

function updateRow(i,key,val){
  rows[i][key]=val;
  calculate();
}

function calculate(){

  let totalProfit = 0;

  // ✅ 持仓系统
  for(let i=0;i<rows.length;i++){

    if(i>0){
      rows[i].holding = Number(rows[i-1].final);
    }

    let h = Number(rows[i].holding)||0;
    let a = parseFloat(rows[i].actual)||0;
    let act = Number(rows[i].action)||0;

    let profit = h*(a/100);

    rows[i].profit = profit.toFixed(2);
    rows[i].final = (h+profit+act).toFixed(0);

    totalProfit += profit;
  }

  // ✅ T+队列系统（核心）
  let tDays = Number(document.getElementById("tDays").value)||7;
  let now = new Date();

  let queue = [];

  rows.forEach(r=>{

    let act = Number(r.action)||0;
    let d = new Date(r.date);

    // 加仓入队
    if(act>0){
      queue.push({amount:act,date:d});
    }

    // 标记是否解锁
    queue.forEach(q=>{
      let diff = (d - q.date)/(1000*60*60*24);
      q.ready = diff>=tDays;
    });

    // 减仓消耗（FIFO）
    if(act<0){
      let need = Math.abs(act);

      for(let i=0;i<queue.length;i++){
        let q = queue[i];
        if(!q.ready) continue;

        let use = Math.min(q.amount,need);
        q.amount -= use;
        need -= use;

        if(need===0) break;
      }
    }
  });

  // 统计当前可卖金额
  let tAmount = 0;

  queue.forEach(q=>{
    let diff = (now - q.date)/(1000*60*60*24);
    if(diff>=tDays){
      tAmount += q.amount;
    }
  });

  let last = rows[rows.length-1]||{};

  document.getElementById("sumHolding").innerText = last.final||0;
  document.getElementById("sumProfit").innerText = totalProfit.toFixed(2);
  document.getElementById("sumT").innerText = tAmount;

  save();
}

function save(){
  localStorage.setItem("rows",JSON.stringify(rows));
  render();
}

function render(){
  let tb=document.getElementById("tbody");
  tb.innerHTML="";

  rows.forEach((r,i)=>{

    let tr=document.createElement("tr");

    tr.innerHTML=`
<td><input type="date" value="${r.date}" onchange="updateRow(${i},'date',this.value)"></td>
<td><input value="${r.estimate}" onchange="updateRow(${i},'estimate',this.value)"></td>
<td><input value="${r.actual}" onchange="updateRow(${i},'actual',this.value)"></td>
<td>${Number(r.holding).toFixed(0)}</td>
<td>${Number(r.profit).toFixed(2)}</td>
<td><input value="${r.action}" onchange="updateRow(${i},'action',this.value)"></td>
<td>${Number(r.final).toFixed(0)}</td>
<td><button class="delBtn" onclick="deleteRow(${i})">删</button></td>
`;

    tb.appendChild(tr);
  });
}

render();

</script>
</body>
</html>
