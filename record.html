<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="utf-8">
<title>每日记录</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#f5f6f8;
  font-size:12px;
}
.container{ padding:6px; }

.top-fixed{
  position:sticky;
  top:0;
  z-index:10;
  background:#f5f6f8;
  padding-bottom:6px;
}

.summary{
  display:flex;
  background:#fff;
  border-radius:8px;
  padding:12px 6px;
  margin-bottom:6px;
}
.summary div{
  flex:1;
  text-align:center;
  font-size:15px;
}
.summary span{
  display:block;
  font-weight:bold;
  font-size:22px;
}

.btn-row{
  display:flex;
  gap:6px;
}
.btn-row button{
  flex:1;
  background:#4CAF50;
  color:#fff;
  border:none;
  padding:10px;
  border-radius:6px;
}

table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  table-layout:fixed;
}

th:nth-child(1), td:nth-child(1){ width:6%; }   /* 序号 */
th:nth-child(2), td:nth-child(2){ width:22%; }  /* 日期 */
th:nth-child(3), td:nth-child(3){ width:10%; }
th:nth-child(4), td:nth-child(4){ width:10%; }
th:nth-child(5), td:nth-child(5){ width:12%; }
th:nth-child(6), td:nth-child(6){ width:12%; }
th:nth-child(7), td:nth-child(7){ width:12%; }
th:nth-child(8), td:nth-child(8){ width:10%; }
th:nth-child(9), td:nth-child(9){ width:6%; }

th,td{
  text-align:center;
  padding:2px;
  font-size:12px;
  white-space:nowrap;
}

th{ background:#eee; }

input, select{
  width:100%;
  font-size:12px;
  text-align:center;
  box-sizing:border-box;
}

.delBtn{
  background:#ff4d4f;
  color:#fff;
  border:none;
  border-radius:4px;
}

.unlockBox{
  background:#fff;
  margin-top:6px;
  padding:6px;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="container">

<div class="top-fixed">

<div class="summary">
  <div>持仓<span id="sumHolding">0</span></div>
  <div>收益<span id="sumProfit">0</span></div>
  <div>
    T+<input id="tDays" value="3" style="width:55px;">金额
    <span id="sumT">0</span>
  </div>
</div>

<div class="btn-row">
  <button onclick="addRow()">+ 新增一天</button>
  <button onclick="calculate()">刷新计算</button>
</div>

</div>

<table>
<thead>
<tr>
<th>#</th>
<th>日期</th>
<th>预估%</th>
<th>实际%</th>
<th>持仓</th>
<th>收益</th>
<th>操作</th>
<th>最终</th>
<th>删</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<div class="unlockBox" id="unlockBox">资金解锁明细：</div>

</div>

<script>

let rows = JSON.parse(localStorage.getItem("rows") || "[]");

/* 星期 */
function getWeekday(d){
  return ["日","一","二","三","四","五","六"][d.getDay()];
}

/* 日期下拉（带星期） */
function getDateOptions(selected){
  let html="";
  let today=new Date();

  for(let i=0;i<60;i++){
    let d=new Date();
    d.setDate(today.getDate()-i);

    let y=d.getFullYear();
    let m=String(d.getMonth()+1).padStart(2,'0');
    let day=String(d.getDate()).padStart(2,'0');

    let str=`${y}-${m}-${day}`;
    let text=`${str}（周${getWeekday(d)}）`;

    html+=`<option value="${str}" ${str===selected?"selected":""}>${text}</option>`;
  }
  return html;
}

function addRow(){
  let prev = rows.length ? Number(rows[rows.length-1].final) : 0;
  let d=new Date();
  let str=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,'0')+"-"+String(d.getDate()).padStart(2,'0');

  rows.push({
    date:str,
    estimate:"",
    actual:"",
    holding:prev,
    profit:0,
    action:0,
    final:prev
  });
  save();
}

function deleteRow(i){
  rows.splice(i,1);
  save();
}

function updateRow(i,key,val){
  rows[i][key]=val;
  save();
}

function calculate(){

  let totalProfit=0;

  for(let i=0;i<rows.length;i++){

    if(i===0){
      rows[i].holding=0;
    }else{
      rows[i].holding=Number(rows[i-1].final);
    }

    let h=Number(rows[i].holding)||0;
    let a=parseFloat(rows[i].actual)||0;
    let act=Number(rows[i].action)||0;

    let profit=h*(a/100);

    rows[i].profit=profit.toFixed(2);
    rows[i].final=(h+profit+act).toFixed(0);

    totalProfit+=profit;
  }

  let tDays=Number(document.getElementById("tDays").value)||3;

  let queue=[];
  let now=new Date();

  rows.forEach(r=>{
    let act=Number(r.action)||0;
    let d=new Date(r.date);

    if(act>0){
      queue.push({amount:act,date:d});
    }

    if(act<0){
      let need=Math.abs(act);
      for(let i=0;i<queue.length;i++){
        let q=queue[i];
        let diff=(d-q.date)/(1000*60*60*24);
        if(diff<tDays) continue;

        let use=Math.min(q.amount,need);
        q.amount-=use;
        need-=use;
        if(need===0) break;
      }
    }
  });

  let tAmount=0;
  let html="";

  queue.forEach(q=>{
    if(q.amount<=0) return;

    let diff=(now-q.date)/(1000*60*60*24);

    if(diff>=tDays){
      tAmount+=q.amount;
      html+=`<div>${q.amount}（可用）</div>`;
    }else{
      let left=Math.ceil(tDays-diff);
      html+=`<div>${q.amount}（剩${left}天）</div>`;
    }
  });

  let last=rows[rows.length-1]||{};

  document.getElementById("sumHolding").innerText=last.final||0;
  document.getElementById("sumProfit").innerText=totalProfit.toFixed(2);
  document.getElementById("sumT").innerText=tAmount;
  document.getElementById("unlockBox").innerHTML="资金解锁明细："+html;

  save();
}

function save(){
  localStorage.setItem("rows",JSON.stringify(rows));
  render();
}

function render(){

  let tb=document.getElementById("tbody");
  tb.innerHTML="";

  rows.forEach((r,i)=>{

    let tr=document.createElement("tr");

    tr.innerHTML=`
<td>${i+1}</td>
<td>
<select onchange="updateRow(${i},'date',this.value)">
${getDateOptions(r.date)}
</select>
</td>
<td><input value="${r.estimate}" onchange="updateRow(${i},'estimate',this.value)"></td>
<td><input value="${r.actual}" onchange="updateRow(${i},'actual',this.value)"></td>
<td>${Number(r.holding).toFixed(0)}</td>
<td>${Number(r.profit).toFixed(2)}</td>
<td><input value="${r.action}" onchange="updateRow(${i},'action',this.value)"></td>
<td>${Number(r.final).toFixed(0)}</td>
<td><button class="delBtn" onclick="deleteRow(${i})">删</button></td>
`;

    tb.appendChild(tr);
  });

}

render();

</script>

</body>
</html>
