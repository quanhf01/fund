<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>每日记录</title>

<style>
body {
  font-family: -apple-system;
  background: #f5f6f8;
  margin: 0;
  font-size: 16px;
}

h3 {
  font-size: 20px;
  padding: 10px;
}

.btn {
  width: 95%;
  margin: 10px auto;
  display: block;
  background: #4CAF50;
  color: white;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

.table-wrap {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
}

th {
  background: #eee;
  padding: 10px 4px;
  font-size: 14px;
}

td {
  padding: 6px 2px;
  text-align: center;
}

input {
  width: 100%;
  padding: 10px;
  font-size: 16px;
  border-radius: 8px;
  border: 1px solid #ddd;
  box-sizing: border-box;
}
</style>

</head>

<body>

<h3>📅 每日记录</h3>

<button class="btn" onclick="addRow()">➕ 新增一天</button>

<div class="table-wrap">
<table>
<thead>
<tr>
<th style="min-width:90px;">日期</th>
<th style="min-width:70px;">预估%</th>
<th style="min-width:70px;">实际%</th>
<th style="min-width:90px;">持仓</th>
<th style="min-width:80px;">加仓</th>
<th style="min-width:80px;">减仓</th>
<th style="min-width:100px;">最终值</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>
</div>

<script>

/* ===== 数据 ===== */
let rows = JSON.parse(localStorage.getItem("rows")||"[]");

/* ===== 新增 ===== */
function addRow(){

  let prev = rows.length>0 ? rows[rows.length-1].final : 10000;

  rows.push({
    date: new Date().toISOString().slice(0,10),
    estimate:"",
    actual:"",
    holding: prev,
    buy:"",
    sell:"",
    final: prev
  });

  save();
}

/* ===== 更新 ===== */
function update(i,key,val){
  rows[i][key]=val;
  calculate();
}

/* ===== 核心计算🔥 ===== */
function calculate(){

  for(let i=0;i<rows.length;i++){

    if(i>0){
      rows[i].holding = Number(rows[i-1].final)||0;
    }

    let h = Number(rows[i].holding)||0;
    let b = Number(rows[i].buy)||0;
    let s = Number(rows[i].sell)||0;

    rows[i].final = (h + b - s).toFixed(2);
  }

  save();
}

/* ===== 保存 ===== */
function save(){
  localStorage.setItem("rows", JSON.stringify(rows));
  render();
}

/* ===== 渲染 ===== */
function render(){

  let tb = document.getElementById("tableBody");
  tb.innerHTML = "";

  rows.forEach((r,i)=>{

    let tr = document.createElement("tr");

    tr.innerHTML = `
<td><input type="date" value="${r.date}" onchange="update(${i},'date',this.value)"></td>

<td><input value="${r.estimate}" onchange="update(${i},'estimate',this.value)"></td>

<td><input value="${r.actual}" onchange="update(${i},'actual',this.value)"></td>

<td>${Number(r.holding).toFixed(2)}</td>

<td><input value="${r.buy}" onchange="update(${i},'buy',this.value)"></td>

<td><input value="${r.sell}" onchange="update(${i},'sell',this.value)"></td>

<td>${Number(r.final).toFixed(2)}</td>
`;

    tb.appendChild(tr);
  });
}

/* 初始化 */
render();

</script>

</body>
</html>
