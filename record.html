<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>每日记录</title>

<style>
body {
  font-family: -apple-system;
  background: #f5f6f8;
  margin: 0;
  font-size: 12px;
}

h3 {
  font-size: 15px;
  padding: 6px;
  margin: 0;
}

/* 🔥 汇总栏 */
.summary {
  background: white;
  margin: 6px;
  padding: 8px;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
  font-size: 12px;
}

.summary div {
  text-align: center;
  flex: 1;
}

.summary span {
  display: block;
  font-weight: bold;
  margin-top: 3px;
}

.days-input {
  width: 40px;
  font-size: 11px;
  text-align: center;
}

/* 按钮 */
.btn {
  width: 96%;
  margin: 6px auto;
  display: block;
  background: #4CAF50;
  color: white;
  padding: 8px;
  border-radius: 8px;
  border: none;
  font-size: 13px;
}

/* 表格 */
table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  table-layout: fixed;
}

th {
  background: #eee;
  font-size: 10px;
  padding: 3px 1px;
}

td {
  padding: 1px;
  text-align: center;
}

input {
  width: 100%;
  padding: 4px 1px;
  font-size: 11px;
  border-radius: 5px;
  border: 1px solid #ddd;
  box-sizing: border-box;
}

.date-input {
  font-size: 10px;
  padding: 2px;
}

/* 紧凑列宽 */
th:nth-child(1), td:nth-child(1) { width: 78px; }
th:nth-child(2), td:nth-child(2) { width: 26px; }
th:nth-child(3), td:nth-child(3) { width: 26px; }
th:nth-child(4), td:nth-child(4) { width: 58px; }
th:nth-child(5), td:nth-child(5) { width: 58px; }
th:nth-child(6), td:nth-child(6) { width: 55px; }
th:nth-child(7), td:nth-child(7) { width: 60px; }

</style>
</head>

<body>

<h3>📅 每日记录</h3>

<!-- 🔥 汇总 -->
<div class="summary">
  <div>持仓<span id="sumHolding">0</span></div>
  <div>累计收益<span id="sumProfit">0</span></div>
  <div>
    T+<input id="days" class="days-input" value="30" onchange="calculate()">金额
    <span id="sumT">0</span>
  </div>
</div>

<button class="btn" onclick="addRow()">➕ 新增一天</button>

<table>
<thead>
<tr>
<th>日期</th>
<th>预估%</th>
<th>实际%</th>
<th>持仓</th>
<th>收益</th>
<th>操作</th>
<th>最终</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

<script>

let rows = JSON.parse(localStorage.getItem("rows")||"[]");

function addRow(){
  let prev = rows.length>0 ? rows[rows.length-1].final : 10000;

  rows.push({
    date: new Date().toISOString().slice(0,10),
    estimate:"",
    actual:"",
    holding: prev,
    profit:0,
    action:0,
    final: prev
  });

  save();
}

function update(i,key,val){
  rows[i][key]=val;
  calculate();
}

function calculate(){

  let totalProfit = 0;

  for(let i=0;i<rows.length;i++){

    if(i>0){
      rows[i].holding = Number(rows[i-1].final)||0;
    }

    let h = Number(rows[i].holding)||0;

    let a = parseFloat(rows[i].actual) || 0;
    a = a / 100;

    let act = Number(rows[i].action)||0;

    rows[i].profit = (h * a).toFixed(2);
    rows[i].final = (h + Number(rows[i].profit) + act).toFixed(0);

    totalProfit += Number(rows[i].profit);
  }

  /* 🔥 汇总计算 */

  // 当前持仓
  let lastHolding = rows.length>0 ? rows[rows.length-1].final : 0;

  // T+N
  let days = Number(document.getElementById("days").value) || 30;
  let now = new Date();
  let tAmount = 0;

  rows.forEach(r=>{
    let d = new Date(r.date);
    let diff = (now - d) / (1000*60*60*24);

    if(diff <= days){
      tAmount += Number(r.final);
    }
  });

  // 更新UI
  document.getElementById("sumHolding").innerText = Number(lastHolding).toFixed(0);
  document.getElementById("sumProfit").innerText = totalProfit.toFixed(2);
  document.getElementById("sumT").innerText = tAmount.toFixed(0);

  save();
}

function save(){
  localStorage.setItem("rows", JSON.stringify(rows));
  render();
}

function render(){

  let tb = document.getElementById("tableBody");
  tb.innerHTML = "";

  rows.forEach((r,i)=>{

    let tr = document.createElement("tr");

    tr.innerHTML = `
<td><input type="date" class="date-input" value="${r.date}" onchange="update(${i},'date',this.value)"></td>

<td><input value="${r.estimate}" onchange="update(${i},'estimate',this.value)"></td>

<td><input value="${r.actual}" onchange="update(${i},'actual',this.value)"></td>

<td>${Number(r.holding).toFixed(0)}</td>

<td>${Number(r.profit).toFixed(2)}</td>

<td><input value="${r.action}" onchange="update(${i},'action',this.value)"></td>

<td>${Number(r.final).toFixed(0)}</td>
`;

    tb.appendChild(tr);
  });

  calculate();
}

render();

</script>

</body>
</html>
