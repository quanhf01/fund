<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>基金实时估算</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI";
  background: #f5f6f8;
  margin: 0;
  padding: 10px;
}

h2 {
  text-align: center;
  font-size: 18px;
  margin: 8px 0;
}

.add-btn {
  width: 100%;
  background: #4CAF50;
  color: white;
  padding: 8px;
  border-radius: 6px;
  border: none;
  font-size: 14px;
  margin-bottom: 8px;
}

.header {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr auto;
  font-size: 12px;
  color: #666;
  padding: 4px 6px;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 8px;
  margin-bottom: 6px;
}

.row {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr auto;
  align-items: center;
  gap: 6px;
}

.row div {
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}

.stock-box {
  display: flex;
  flex-direction: column;
}

.name {
  font-size: 14px;
  font-weight: 600;
}

.codeInput {
  border: none;
  border-bottom: 1px solid #ddd;
  background: transparent;
  font-size: 11px;
  color: #999;
  padding: 2px 0;
}

.weight-box {
  display: flex;
  justify-content: center;
}

.weight {
  width: 60px;
  border: none;
  border-radius: 20px;
  background: #f0f2f5;
  text-align: center;
  font-size: 13px;
  padding: 4px 0;
}

.change {
  font-size: 13px;
  font-weight: 500;
}

.red { color: #e53935; }
.green { color: #2e7d32; }

.delete-btn {
  background: #ff4d4f;
  color: white;
  border: none;
  border-radius: 4px;
  padding: 3px 6px;
  font-size: 12px;
}

#total {
  text-align: center;
  font-size: 26px;
  font-weight: bold;
  margin-top: 10px;
}

.tab-container {
  margin-top: 20px;
}

.tab-button {
  padding: 10px;
  background-color: #4CAF50;
  color: white;
  border: none;
  cursor: pointer;
  font-size: 14px;
}

.tab-button:hover {
  background-color: #45a049;
}

.tab-content {
  display: none;
}

.tab-content.active {
  display: block;
}

</style>
</head>

<body>

<h2>基金实时估算</h2>

<button class="add-btn" onclick="addTab()">➕ 添加股票列表</button>

<div class="tab-container" id="tab-container"></div>

<div id="total">0%</div>

<script>
let tabCounter = 0;

async function getStockData(code) {
  try {
    let res = await fetch(`https://qt.gtimg.cn/q=${code}`);
    let buffer = await res.arrayBuffer();
    let text = new TextDecoder("gbk").decode(buffer);
    let data = text.split("~");

    let price = parseFloat(data[3]);
    let yesterday = parseFloat(data[4]);
    let change = ((price - yesterday) / yesterday) * 100;

    return {
      name: data[1],
      change: change
    };

  } catch {
    return { name: "-", change: 0 };
  }
}

async function calculate(tabId) {
  let cards = document.querySelectorAll(`#tab-${tabId} .card`);
  let total = 0;

  for (let card of cards) {
    let code = card.querySelector(".codeInput").value.trim();
    let weight = parseFloat(card.querySelector(".weight").value) / 100;

    if (!code) continue;

    let data = await getStockData(code);

    let change = data.change;
    let impact = change * weight;

    card.querySelector(".name").innerText = data.name;

    let changeEl = card.querySelector(".change");
    changeEl.innerText = change.toFixed(2) + "%";
    changeEl.className = "change " + (change >= 0 ? "red" : "green");

    let impactEl = card.querySelector(".impact");
    impactEl.innerText = impact.toFixed(4) + "%";
    impactEl.className = "change " + (impact >= 0 ? "red" : "green");

    total += impact;
  }

  let totalEl = document.getElementById(`total-${tabId}`);
  totalEl.innerText = total.toFixed(4) + "%";
  totalEl.style.color = total >= 0 ? "#e53935" : "#2e7d32";
}

function addTab() {
  tabCounter++;
  
  const tabButton = document.createElement('button');
  tabButton.classList.add('tab-button');
  tabButton.innerText = `股票列表 ${tabCounter}`;
  tabButton.onclick = () => setActiveTab(tabCounter);

  const tabContent = document.createElement('div');
  tabContent.id = `tab-${tabCounter}`;
  tabContent.classList.add('tab-content');
  
  const header = document.createElement('div');
  header.classList.add('header');
  header.innerHTML = `
    <div>股票</div>
    <div>占比</div>
    <div>涨跌</div>
    <div>影响</div>
    <div></div>
  `;
  
  tabContent.appendChild(header);
  const list = document.createElement('div');
  list.id = `list-${tabCounter}`;
  tabContent.appendChild(list);

  const total = document.createElement('div');
  total.id = `total-${tabCounter}`;
  total.innerText = '0%';
  tabContent.appendChild(total);

  document.getElementById('tab-container').appendChild(tabButton);
  document.getElementById('tab-container').appendChild(tabContent);
  
  addRow(tabCounter);
  setActiveTab(tabCounter);
}

function setActiveTab(tabId) {
  const tabs = document.querySelectorAll('.tab-content');
  const buttons = document.querySelectorAll('.tab-button');
  
  tabs.forEach(tab => tab.classList.remove('active'));
  buttons.forEach(button => button.classList.remove('active'));
  
  document.getElementById(`tab-${tabId}`).classList.add('active');
  buttons[tabId - 1].classList.add('active');
  calculate(tabId);
}

function addRow(tabId, code = "", weight = 10) {
  let div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <div class="row">
      <div class="stock-box">
        <div class="name">--</div>
        <input class="codeInput" value="${code}" placeholder="sh600900">
      </div>
      <div class="weight-box">
        <input class="weight" value="${weight}">
      </div>
      <div class="change">-</div>
      <div class="impact">-</div>
      <button class="delete-btn" onclick="this.parentNode.parentNode.remove()">删</button>
    </div>
  `;

  document.getElementById(`list-${tabId}`).appendChild(div);
}

function init() {
  addTab();
}

init();
setInterval(() => calculate(tabCounter), 5000);
</script>

</body>
</html>
