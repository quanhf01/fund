<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>每日记录</title>

<style>
body {
  font-family: -apple-system;
  background: #f5f6f8;
  margin: 0;
  font-size: 12px;
}

h3 {
  font-size: 15px;
  padding: 6px;
  margin: 0;
}

.btn {
  width: 96%;
  margin: 6px auto;
  display: block;
  background: #4CAF50;
  color: white;
  padding: 8px;
  border-radius: 8px;
  border: none;
  font-size: 13px;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  table-layout: fixed;
}

th {
  background: #eee;
  font-size: 10px;
  padding: 3px 1px;
}

td {
  padding: 1px;
  text-align: center;
}

input {
  width: 100%;
  padding: 4px 1px;
  font-size: 11px;
  border-radius: 5px;
  border: 1px solid #ddd;
  box-sizing: border-box;
}

.date-input {
  font-size: 10px;
  padding: 2px;
}

/* 🔥 极限压缩列宽 */
th:nth-child(1), td:nth-child(1) { width: 78px; }  /* 日期 */
th:nth-child(2), td:nth-child(2) { width: 26px; }  /* 预估 */
th:nth-child(3), td:nth-child(3) { width: 26px; }  /* 实际 */
th:nth-child(4), td:nth-child(4) { width: 58px; }  /* 持仓 */
th:nth-child(5), td:nth-child(5) { width: 58px; }  /* 收益 */
th:nth-child(6), td:nth-child(6) { width: 55px; }  /* 操作 */
th:nth-child(7), td:nth-child(7) { width: 60px; }  /* 最终 */

</style>
</head>

<body>

<h3>📅 每日记录</h3>

<button class="btn" onclick="addRow()">➕ 新增一天</button>

<table>
<thead>
<tr>
<th>日期</th>
<th>预估%</th>
<th>实际%</th>
<th>持仓</th>
<th>收益</th>
<th>操作</th>
<th>最终</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

<script>

let rows = JSON.parse(localStorage.getItem("rows")||"[]");

/* 新增 */
function addRow(){
  let prev = rows.length>0 ? rows[rows.length-1].final : 10000;

  rows.push({
    date: new Date().toISOString().slice(0,10),
    estimate:"",
    actual:"",
    holding: prev,
    profit:0,
    action:0,
    final: prev
  });

  save();
}

/* 更新 */
function update(i,key,val){
  rows[i][key]=val;
  calculate();
}

/* 自动计算 */
function calculate(){

  for(let i=0;i<rows.length;i++){

    if(i>0){
      rows[i].holding = Number(rows[i-1].final)||0;
    }

    let h = Number(rows[i].holding)||0;

    /* 支持 0.1% */
    let a = parseFloat(rows[i].actual) || 0;
    a = a / 100;

    let act = Number(rows[i].action)||0;

    /* ✅ 收益保留2位小数 */
    rows[i].profit = (h * a).toFixed(2);

    /* 最终 */
    rows[i].final = (h + Number(rows[i].profit) + act).toFixed(0);
  }

  save();
}

/* 保存 */
function save(){
  localStorage.setItem("rows", JSON.stringify(rows));
  render();
}

/* 渲染 */
function render(){

  let tb = document.getElementById("tableBody");
  tb.innerHTML = "";

  rows.forEach((r,i)=>{

    let tr = document.createElement("tr");

    tr.innerHTML = `
<td><input type="date" class="date-input" value="${r.date}" onchange="update(${i},'date',this.value)"></td>

<td><input value="${r.estimate}" maxlength="5" onchange="update(${i},'estimate',this.value)"></td>

<td><input value="${r.actual}" maxlength="6" onchange="update(${i},'actual',this.value)"></td>

<td>${Number(r.holding).toFixed(0)}</td>

<td>${Number(r.profit).toFixed(2)}</td>

<td><input value="${r.action}" onchange="update(${i},'action',this.value)"></td>

<td>${Number(r.final).toFixed(0)}</td>
`;

    tb.appendChild(tr);
  });
}

/* 初始化 */
render();

</script>

</body>
</html>
