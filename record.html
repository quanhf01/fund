<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>每日记录</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#f5f6f8;
  font-size:12px;
}

/* 顶部 */
.top{
  background:#fff;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.box{
  text-align:center;
}

.greenBtn{
  background:#4CAF50;
  color:#fff;
  padding:10px;
  border-radius:8px;
  text-align:center;
  margin:10px;
}

/* 表格 */
table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
}

th,td{
  padding:4px 2px;
  text-align:center;
  white-space:nowrap;
}

th{
  background:#eee;
}

/* 输入框 */
input{
  width:100%;
  min-width:0;
  box-sizing:border-box;
  font-size:12px;
  text-align:center;
}

/* 删除按钮 */
.del{
  background:#ff4d4f;
  color:#fff;
  border:none;
  padding:4px 6px;
  border-radius:6px;
}

/* 收益颜色 */
.pos{
  color:#0a8f3c;
  font-weight:bold;
}

.neg{
  color:#d4380d;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="top">
  <div class="box">
    <div>持仓</div>
    <div id="totalHold">0</div>
  </div>
  <div class="box">
    <div>累计收益</div>
    <div id="totalProfit">0</div>
  </div>
  <div class="box">
    <div>T+ <input id="tDays" value="5" style="width:40px"> 金额</div>
    <div id="tMoney">5000</div>
  </div>
</div>

<div class="greenBtn" onclick="addRow()">+ 新增一天</div>

<table id="table">

<colgroup>
  <col style="width:85px">
  <col style="width:40px">
  <col style="width:45px">
  <col style="width:60px">
  <col style="width:55px">
  <col style="width:65px">
  <col style="width:65px">
  <col style="width:30px">
</colgroup>

<thead>
<tr>
  <th>日期</th>
  <th>预估%</th>
  <th>实际%</th>
  <th>持仓</th>
  <th>收益</th>
  <th>操作</th>
  <th>最终</th>
  <th></th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

<script>

let data = []

function addRow(){
  data.push({
    date:new Date().toISOString().slice(0,10),
    est:0,
    real:0,
    hold:0,
    profit:0,
    action:0,
    final:0
  })
  render()
}

function render(){

  let tbody = document.getElementById("tbody")
  tbody.innerHTML = ""

  let prevFinal = 0
  let totalProfit = 0

  data.forEach((row,i)=>{

    row.hold = i===0 ? 0 : prevFinal

    row.profit = +(row.hold * (row.real||0) / 100).toFixed(2)
    row.final = Math.round(row.hold + row.profit + (row.action||0))

    prevFinal = row.final
    totalProfit += row.profit

    let tr = document.createElement("tr")

    tr.innerHTML = `
<td><input type="date" value="${row.date}" onchange="update(${i},'date',this.value)"></td>
<td><input value="${row.est}" onchange="update(${i},'est',this.value)"></td>
<td><input value="${row.real}" onchange="update(${i},'real',this.value)"></td>
<td>${row.hold}</td>
<td class="${row.profit>=0?'pos':'neg'}">${row.profit}</td>
<td><input value="${row.action}" onchange="update(${i},'action',this.value)"></td>
<td>${row.final}</td>
<td><button class="del" onclick="del(${i})">删</button></td>
`

    tbody.appendChild(tr)

  })

  document.getElementById("totalHold").innerText = prevFinal
  document.getElementById("totalProfit").innerText = totalProfit.toFixed(2)

}

function update(i,key,val){
  data[i][key] = parseFloat(val) || 0
  render()
}

function del(i){
  data.splice(i,1)
  render()
}

render()

</script>

</body>
</html>
